                "acceptedAnswer":{
                    "@type":"Answer",
                    "text":"A obra foi escrita por Adam Smith (1723–1790), filósofo e economista escocês considerado um dos fundadores da economia moderna. Antes de escrever o livro, Smith já havia publicado estudos sobre filosofia moral e comportamento humano."

                }
                },

                "@type":"Question",
                "name":"O que Adam Smith quis dizer com divisão do trabalho?",
                "acceptedAnswer":{
                    "@type":"Answer",
                    "text":"A divisão do trabalho significa separar uma atividade em diferentes tarefas, permitindo que cada trabalhador se especialize em uma função específica. Segundo Smith, isso aumenta a produtividade, reduz o desperdício de tempo e melhora a eficiência da produção."
                }
