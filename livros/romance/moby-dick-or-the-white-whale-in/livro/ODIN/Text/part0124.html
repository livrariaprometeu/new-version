      <p class="titulo-1-cinza-esp-abaixo">CHAPTER 122. Midnight Aloft.—Thunder and Lightning.<br></p>

    <p class="suma">
      <i>The main-top-sail yard</i>.—<i>Tashtego passing new lashings around it</i>.
    </p>
    <p class="suma">
      “Um, um, um. Stop that thunder! Plenty too much thunder up here. What’s
      the use of thunder? Um, um, um. We don’t want thunder; we want rum; give
      us a glass of rum. Um, um, um!”
     </p>
