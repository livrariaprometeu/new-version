                    "@type": "Question",
                    "name": "Quem foi Adam Smith?",
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": "Adam Smith foi um filósofo, economista e professor escocês do século XVIII, amplamente considerado o pai da economia moderna. Nascido em 1723, tornou-se uma das figuras mais importantes do Iluminismo Escocês e é conhecido principalmente pelas obras A Teoria dos Sentimentos Morais e A Riqueza das Nações."
                    }
                    },
                    {
                    "@type": "Question",
                    "name": "O que é a mão invisível de Adam Smith?",
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": "A mão invisível é uma metáfora utilizada por Adam Smith para explicar como as ações individuais podem, em determinadas circunstâncias, gerar benefícios para toda a sociedade. Segundo Smith, pessoas e empresas, ao buscarem seus próprios interesses, podem contribuir para a produção de riqueza e a satisfação das necessidades coletivas."
                    }
                    },
                    {
                    "@type": "Question",
                    "name": "Adam Smith defendia um Estado totalmente ausente na economia?",
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": "Não. Embora defendesse a liberdade econômica e criticasse excessos de intervenção estatal, Adam Smith acreditava que o governo possuía funções fundamentais, como defesa nacional, administração da justiça, proteção da propriedade privada, construção de obras públicas e incentivo à educação."
                    }
                    },
                    {
                    "@type": "Question",
                    "name": "Qual é a principal obra de Adam Smith?",
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": "Sua obra mais famosa é Uma Investigação sobre a Natureza e as Causas da Riqueza das Nações, geralmente chamada apenas de A Riqueza das Nações, publicada em 1776. O livro é considerado um marco fundador da economia clássica e uma das obras mais influentes da história do pensamento econômico."
                    }
                    },
                    {
                    "@type": "Question",
                    "name": "O que Adam Smith pensava sobre a divisão do trabalho?",
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": "Adam Smith considerava a divisão do trabalho uma das principais fontes de aumento da produtividade e da riqueza das nações. Seu exemplo mais famoso é o da fábrica de alfinetes, em que trabalhadores especializados em pequenas etapas da produção conseguem produzir muito mais do que se cada um realizasse todas as tarefas sozinho."
                    }
                    },
                    {
                    "@type": "Question",
                    "name": "Adam Smith era apenas um economista?",
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": "Não. Embora seja lembrado principalmente pela economia, Adam Smith foi antes de tudo um filósofo moral. Suas obras abordam ética, política, direito, psicologia humana e história, sendo estudadas atualmente em diversas áreas do conhecimento."
                    }
                    },
                    {
                    "@type": "Question",
                    "name": "Qual foi a influência de Adam Smith sobre o capitalismo?",
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": "As ideias de Adam Smith ajudaram a fornecer a base teórica para o desenvolvimento do capitalismo moderno. Sua defesa da livre iniciativa, da concorrência e da liberdade de comércio influenciou governos, empresários e economistas ao longo dos séculos XIX e XX."
                    }
                    },

                    "@type": "Question",
                    "name": "Por que Adam Smith continua relevante nos dias atuais?",

                        "@type": "Answer",
